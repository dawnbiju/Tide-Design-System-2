name: Deploy Webhook Bridge

# Deploys the Cloudflare Worker that bridges Figma webhooks → GitHub Actions.
# Runs whenever files inside webhook-bridge/ change, or manually.

on:
  push:
    branches: [main]
    paths:
      - 'webhook-bridge/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: webhook-bridge
          secrets: |
            GITHUB_PAT
            WEBHOOK_SECRET
        env:
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          WEBHOOK_SECRET: ${{ secrets.FIGMA_WEBHOOK_SECRET }}
